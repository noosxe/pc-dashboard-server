name: Release Go Binary

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Install Dependencies
        run: go mod download

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1

      - name: Generate Proto Code
        run: buf generate
        working-directory: api

      - name: Verify Protos Up-To-Date
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Generated protobuf files are out of sync! Please run 'buf generate' inside the 'api' directory locally and commit changes."
            git status --porcelain
            git diff
            exit 1
          fi

      - name: Run Tests
        run: go test -race -v ./...

      - name: Build Release Binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -v -ldflags="-s -w" -o pc-dashboard-server-linux-amd64 main.go

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: pc-dashboard-server-linux-amd64
          draft: false
          prerelease: false
          generate_release_notes: true
