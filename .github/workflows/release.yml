name: Release Go Binary

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Install Dependencies
        run: go mod download

      - name: Run Tests
        run: go test -race -v ./...

      - name: Build Release Binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -v -ldflags="-s -w" -o pc-dashboard-server-linux-amd64 main.go

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: pc-dashboard-server-linux-amd64
          draft: false
          prerelease: false
          generate_release_notes: true
