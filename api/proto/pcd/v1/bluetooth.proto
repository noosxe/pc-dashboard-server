syntax = "proto3";

package pcd.v1;

option go_package = "github.com/noosxe/pc-dashboard-server/pkg/api/pcd/v1;pcdv1";

message BluetoothDevice {
  string address = 1;
  string name = 2;
  string alias = 3;
  uint32 class = 4;
  optional int32 battery_percent = 5;
  optional int32 rssi = 6;
  bool connected = 7;
  bool paired = 8;
  bool trusted = 9;
}

message BluetoothStatePayload {
  string event_type = 1; // "connected", "disconnected", "updated", "snapshot"
  BluetoothDevice device = 2; // The device that triggered the event (may be empty for snapshots)
  repeated BluetoothDevice connected_devices = 3;
}

message StreamBluetoothStateRequest {}

message StreamBluetoothStateResponse {
  int64 timestamp = 1;
  BluetoothStatePayload payload = 2;
}

service BluetoothService {
  rpc StreamBluetoothState(StreamBluetoothStateRequest) returns (stream StreamBluetoothStateResponse);
}
